<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GREEN-API Тестовое</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 40px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { background: #25D366; color: white; border: none; cursor: pointer; }
        textarea { width: 100%; height: 150px; margin-top: 10px; font-family: monospace; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
    </style>
</head>
<body>
    <h2>Параметры подключения</h2>
    <input type="text" id="id" placeholder="idInstance">
    <input type="text" id="token" placeholder="apiTokenInstance">

    <button onclick="call('getSettings')">getSettings</button>
    <button onclick="call('getStateInstance')">getStateInstance</button>

    <h3>Отправить сообщение</h3>
    <div class="row">
        <input type="text" id="phone" placeholder="Номер (79001234567)">
        <input type="text" id="msg" placeholder="Текст">
    </div>
    <button onclick="sendMessage()">sendMessage</button>

    <h3>Отправить файл по URL</h3>
    <div class="row">
        <input type="text" id="filePhone" placeholder="Номер">
        <input type="text" id="url" placeholder="URL файла">
    </div>
    <button onclick="sendFile()">sendFileByUrl</button>

    <h3>Результат</h3>
    <textarea id="result" readonly></textarea>

    <script>
        const base = "https://api.green-api.com";
        
        let $ = (id) => document.getElementById(id);
        
        function creds() {
            let id = $('id').value.trim(), token = $('token').value.trim();
            if (!id || !token) return alert("Введите idInstance и token");
            return { id, token };
        }
        
        function phoneNum(p) {
            let ph = p.replace(/\D/g, '');
            if (ph.startsWith('8')) ph = '7' + ph.slice(1);
            return (ph.length === 11 && ph.startsWith('7')) ? ph : null;
        }
        
        async function call(method) {
            let c = creds();
            if (!c) return;
            try {
                let res = await fetch(`${base}/waInstance${c.id}/${method}/${c.token}`);
                $('result').value = JSON.stringify(await res.json(), null, 2);
            } catch(e) { $('result').value = e.message; }
        }
        
        async function sendMessage() {
            let c = creds();
            if (!c) return;
            let ph = phoneNum($('phone').value);
            let msg = $('msg').value;
            if (!ph || !msg) return alert("Введите номер (11 цифр) и текст");
            try {
                let res = await fetch(`${base}/waInstance${c.id}/sendMessage/${c.token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chatId: ph + "@c.us", message: msg })
                });
                let data = await res.json();
                $('result').value = JSON.stringify(data, null, 2);
                data.idMessage ? alert("Отправлено") : alert("Ошибка: " + data.error);
            } catch(e) { alert(e.message); }
        }
        
        async function sendFile() {
            let c = creds();
            if (!c) return;
            let ph = phoneNum($('filePhone').value);
            let url = $('url').value;
            if (!ph || !url) return alert("Введите номер и URL");
            try {
                let res = await fetch(`${base}/waInstance${c.id}/sendFileByUrl/${c.token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        chatId: ph + "@c.us",
                        urlFile: url,
                        fileName: url.split('/').pop().split('?')[0] || "file"
                    })
                });
                let data = await res.json();
                $('result').value = JSON.stringify(data, null, 2);
                data.idMessage ? alert("Файл отправлен") : alert("Ошибка: " + data.error);
            } catch(e) { alert(e.message); }
        }
    </script>
</body>
</html>
