<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GREEN-API Тестовое</title>
    <style>
        body { font-family: Arial; max-width: 500px; margin: 40px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #25D366; color: white; border: none; cursor: pointer; }
        textarea { width: 100%; height: 150px; margin-top: 10px; font-family: monospace; }
        .row { display: flex; gap: 10px; }
        .row input { flex: 1; }
    </style>
</head>
<body>
    <h2>Параметры подключения</h2>
    <input type="text" id="id" placeholder="idInstance">
    <input type="text" id="token" placeholder="apiTokenInstance">

    <button onclick="call('getSettings')">getSettings</button>
    <button onclick="call('getStateInstance')">getStateInstance</button>

    <h3>Отправить сообщение</h3>
    <div class="row">
        <input type="text" id="phone" placeholder="Номер (79001234567)">
        <input type="text" id="msg" placeholder="Текст">
    </div>
    <button onclick="sendMessage()">sendMessage</button>

    <h3>Отправить файл по URL</h3>
    <div class="row">
        <input type="text" id="filePhone" placeholder="Номер">
        <input type="text" id="url" placeholder="URL файла">
    </div>
    <button onclick="sendFile()">sendFileByUrl</button>

    <h3>Результат</h3>
    <textarea id="result" readonly></textarea>

    <script>
        const base = "https://api.green-api.com";
        
        function getCreds() {
            let id = document.getElementById("id").value.trim();
            let token = document.getElementById("token").value.trim();
            if (!id || !token) { alert("Введите idInstance и token"); return null; }
            return { id, token };
        }

        async function call(method) {
            let creds = getCreds();
            if (!creds) return;
            try {
                let res = await fetch(`${base}/waInstance${creds.id}/${method}/${creds.token}`);
                let data = await res.json();
                document.getElementById("result").value = JSON.stringify(data, null, 2);
            } catch(e) { document.getElementById("result").value = e.message; }
        }

        async function sendMessage() {
            let creds = getCreds();
            if (!creds) return;
            let phone = document.getElementById("phone").value.replace(/\D/g, '');
            if (phone.startsWith('8')) phone = '7' + phone.slice(1);
            let msg = document.getElementById("msg").value;
            if (!phone || !msg) { alert("Введите номер и текст"); return; }
            
            try {
                let res = await fetch(`${base}/waInstance${creds.id}/sendMessage/${creds.token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chatId: phone + "@c.us", message: msg })
                });
                let data = await res.json();
                document.getElementById("result").value = JSON.stringify(data, null, 2);
                if (data.idMessage) alert("✅ Отправлено!");
            } catch(e) { alert("Ошибка: " + e.message); }
        }

        async function sendFile() {
            let creds = getCreds();
            if (!creds) return;
            let phone = document.getElementById("filePhone").value.replace(/\D/g, '');
            if (phone.startsWith('8')) phone = '7' + phone.slice(1);
            let url = document.getElementById("url").value;
            if (!phone || !url) { alert("Введите номер и URL"); return; }
            
            try {
                let res = await fetch(`${base}/waInstance${creds.id}/sendFileByUrl/${creds.token}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ chatId: phone + "@c.us", urlFile: url, fileName: url.split('/').pop() })
                });
                let data = await res.json();
                document.getElementById("result").value = JSON.stringify(data, null, 2);
                if (data.idMessage) alert("✅ Файл отправлен!");
            } catch(e) { alert("Ошибка: " + e.message); }
        }
    </script>
</body>
</html>
