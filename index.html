<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GREEN-API Тестовое задание</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #25D366;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #128C7E;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin-top: 10px;
            font-family: monospace;
            resize: vertical;
        }
        h2 {
            margin-top: 20px;
        }
        hr {
            margin: 20px 0;
        }
        .phone-input {
            display: flex;
            gap: 10px;
        }
        .phone-input input {
            flex: 1;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>GREEN-API Тестовое задание</h1>

        <h2>Параметры подключения</h2>
        <input type="text" id="idInstance" placeholder="idInstance" autocomplete="off">
        <input type="text" id="apiTokenInstance" placeholder="apiTokenInstance" autocomplete="off">

        <h2>Методы API</h2>
        <button onclick="callGetSettings()">getSettings</button>
        <button onclick="callGetStateInstance()">getStateInstance</button>

        <h3>Отправить сообщение</h3>
        <div class="phone-input">
            <input type="text" id="phoneNumber" placeholder="Номер телефона (например, 79001234567)">
            <input type="text" id="messageText" placeholder="Текст сообщения">
        </div>
        <button onclick="callSendMessage()">sendMessage</button>

        <h3>Отправить файл по URL</h3>
        <div class="phone-input">
            <input type="text" id="filePhone" placeholder="Номер телефона">
            <input type="text" id="fileUrl" placeholder="URL файла (например, https://example.com/image.jpg)">
        </div>
        <button onclick="callSendFileByUrl()">sendFileByUrl</button>

        <h2>Результат выполнения</h2>
        <textarea id="resultArea" readonly placeholder="Здесь будет ответ от API..."></textarea>
    </div>

    <script>
        const API_BASE = "https://api.green-api.com";

        function getInstanceData() {
            const idInstance = document.getElementById("idInstance").value.trim();
            const apiToken = document.getElementById("apiTokenInstance").value.trim();
            if (!idInstance || !apiToken) {
                alert("Введите idInstance и apiTokenInstance");
                return null;
            }
            return { idInstance, apiToken };
        }

        function showResult(data) {
            document.getElementById("resultArea").value = JSON.stringify(data, null, 2);
        }

        async function callGetSettings() {
            const { idInstance, apiToken } = getInstanceData();
            if (!idInstance) return;

            const url = `${API_BASE}/waInstance${idInstance}/getSettings/${apiToken}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }

        async function callGetStateInstance() {
            const { idInstance, apiToken } = getInstanceData();
            if (!idInstance) return;

            const url = `${API_BASE}/waInstance${idInstance}/getStateInstance/${apiToken}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }

        async function callSendMessage() {
            const { idInstance, apiToken } = getInstanceData();
            if (!idInstance) return;

            let phone = document.getElementById("phoneNumber").value.trim();
            const message = document.getElementById("messageText").value.trim();

            if (!phone || !message) {
                alert("Введите номер телефона и текст сообщения");
                return;
            }

            // Форматирование номера
            phone = phone.replace(/\D/g, '');
            if (!phone.startsWith('7') && !phone.startsWith('8')) {
                alert("Номер должен начинаться с 7 или 8");
                return;
            }
            if (phone.startsWith('8')) phone = '7' + phone.slice(1);

            const chatId = `${phone}@c.us`;

            const url = `${API_BASE}/waInstance${idInstance}/sendMessage/${apiToken}`;
            const body = {
                chatId: chatId,
                message: message
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }

        async function callSendFileByUrl() {
            const { idInstance, apiToken } = getInstanceData();
            if (!idInstance) return;

            let phone = document.getElementById("filePhone").value.trim();
            const fileUrl = document.getElementById("fileUrl").value.trim();

            if (!phone || !fileUrl) {
                alert("Введите номер телефона и URL файла");
                return;
            }

            phone = phone.replace(/\D/g, '');
            if (!phone.startsWith('7') && !phone.startsWith('8')) {
                alert("Номер должен начинаться с 7 или 8");
                return;
            }
            if (phone.startsWith('8')) phone = '7' + phone.slice(1);

            const chatId = `${phone}@c.us`;

            const url = `${API_BASE}/waInstance${idInstance}/sendFileByUrl/${apiToken}`;
            const body = {
                chatId: chatId,
                urlFile: fileUrl,
                fileName: "file"
            };

            try {
                const response = await fetch(url, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                const data = await response.json();
                showResult(data);
            } catch (error) {
                showResult({ error: error.message });
            }
        }
    </script>
</body>
</html>
